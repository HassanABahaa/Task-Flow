<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Activated – TaskFlow</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #eef0f8;
      font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* Subtle light blobs */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.25;
      animation: drift 8s ease-in-out infinite alternate;
    }

    .blob-1 {
      width: 500px;
      height: 500px;
      background: #c4beff;
      top: -150px;
      left: -120px;
      animation-delay: 0s;
    }

    .blob-2 {
      width: 400px;
      height: 400px;
      background: #a5c8fe;
      bottom: -120px;
      right: -100px;
      animation-delay: 2s;
    }

    .blob-3 {
      width: 300px;
      height: 300px;
      background: #d8b4fe;
      top: 40%;
      left: 55%;
      animation-delay: 4s;
    }

    @keyframes drift {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(20px, 30px) scale(1.05);
      }
    }

    /* Card — matches dashboard white cards */
    .card {
      position: relative;
      z-index: 1;
      background: #ffffff;
      border: 1px solid #e2e6f0;
      border-radius: 24px;
      padding: 56px 52px 48px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(100, 90, 200, 0.08);
      animation: slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.96);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Logo */
    .logo {
      font-size: 22px;
      font-weight: 800;
      color: #1a1d2e;
      letter-spacing: -0.5px;
      margin-bottom: 28px;
      display: block;
    }

    .logo span {
      color: #7c6ff7;
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(124, 111, 247, 0.08);
      border: 1px solid rgba(124, 111, 247, 0.2);
      color: #7c6ff7;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 32px;
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      background: #7c6ff7;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.4;
        transform: scale(0.7);
      }
    }

    /* Icon circle */
    .icon-wrap {
      width: 88px;
      height: 88px;
      background: linear-gradient(135deg, #7c6ff7, #5b4fe0);
      border-radius: 50%;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 14px rgba(124, 111, 247, 0.08),
        0 8px 32px rgba(124, 111, 247, 0.25);
      animation: pop 0.5s 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes pop {
      from {
        transform: scale(0);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .icon-wrap svg {
      width: 40px;
      height: 40px;
      stroke: #fff;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: drawCheck 0.4s 0.9s ease forwards;
    }

    @keyframes drawCheck {
      to {
        stroke-dashoffset: 0;
      }
    }

    h1 {
      color: #1a1d2e;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.4px;
      margin-bottom: 12px;
    }

    p {
      color: #8b90a0;
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    /* Button — matches "+ New Task" button in dashboard */
    .btn {
      display: block;
      background: linear-gradient(135deg, #7c6ff7, #5b4fe0);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      padding: 15px 44px;
      border-radius: 12px;
      letter-spacing: 0.2px;
      box-shadow: 0 6px 20px rgba(124, 111, 247, 0.3);
      transition: transform 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(124, 111, 247, 0.4);
    }

    .footer {
      margin-top: 28px;
      color: #b0b5cc;
      font-size: 12px;
    }
  </style>
</head>

<body>

  <!-- Soft background blobs -->
  <div class="bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Card -->
  <div class="card">
    <span class="logo">Task<span>Flow</span></span>

    <div class="badge">
      <div class="badge-dot"></div>
      Account Verified
    </div>

    <div class="icon-wrap">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12" />
      </svg>
    </div>

    <h1>You're all set! <i class="bi bi-stars" style="color:#f59e0b;font-size:24px;vertical-align:middle;"></i></h1>
    <p>Your account has been activated successfully.<br />Start organizing your tasks and boosting your productivity.
    </p>

    <a href="http://127.0.0.1:5500/Frontend/index.html" class="btn">Go to Login →</a>

    <p class="footer">© 2026 TaskFlow · Built by Hassan Bahaa</p>
  </div>

</body>

</html>
